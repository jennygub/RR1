<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment Assignment</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 620px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="tel"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .info-box {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #ddd;
      background: #fafafa;
    }

    .consent-box {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid #ddd;
    }

    .consent-box label {
      display: inline;
      font-weight: normal;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      font-size: 16px;
      cursor: pointer;
    }

    .msg {
      margin-top: 14px;
      color: #444;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>

<body>

  <h2>Start Experiment</h2>

  <div class="info-box">
    <p>
      INSERT YOUR PARAGRAPH TEXT HERE.
    </p>

    <p>
      Please read the consent document here:
      <a href="https://example.com/your-consent-document" target="_blank" rel="noopener noreferrer">
        Open consent document
      </a>
    </p>
  </div>

  <form id="assignmentForm">

    <label for="studentId">Student ID</label>
    <input
      type="tel"
      id="studentId"
      name="studentId"
      inputmode="numeric"
      minlength="7"
      maxlength="9"
      pattern="[0-9]{7,9}"
      placeholder="Enter 7-9 digit ID"
      required
    />

    <div class="consent-box">
      <input type="checkbox" id="consent" name="consent" required />
      <label for="consent">
        INSERT YOUR LONG CONSENT CHECKBOX TEXT HERE.
      </label>
    </div>

    <button type="submit" id="submitBtn">Continue</button>

  </form>

  <div class="msg" id="msg"></div>

  <script>
    // Replace with the Google Forms entry ID for the Student ID field.
    // Example: "entry.123456789"
    const GOOGLE_FORM_STUDENT_ID_ENTRY = "entry.123456789";

    function addStudentIdToGoogleFormUrl(baseUrl, studentId) {
      const url = new URL(baseUrl);
      url.searchParams.set(GOOGLE_FORM_STUDENT_ID_ENTRY, studentId);
      return url.toString();
    }

    document.getElementById("assignmentForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const msg = document.getElementById("msg");
      const btn = document.getElementById("submitBtn");

      msg.className = "msg";
      msg.textContent = "";

      const studentId = document.getElementById("studentId").value.trim();
      const consentChecked = document.getElementById("consent").checked;

      if (!/^[0-9]{7,9}$/.test(studentId)) {
        msg.className = "msg error";
        msg.textContent = "Please enter an ID with 7 to 9 digits.";
        return;
      }

      if (!consentChecked) {
        msg.className = "msg error";
        msg.textContent = "Please check the consent box.";
        return;
      }

      btn.disabled = true;
      msg.textContent = "Assigning and redirecting...";

      try {
        const response = await fetch("/.netlify/functions/assign", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            studentId: studentId,
            consent: consentChecked
          })
        });

        const rawText = await response.text();

        let result;
        try {
          result = rawText ? JSON.parse(rawText) : {};
        } catch (e) {
          throw new Error("Server returned non-JSON response: " + rawText);
        }

        if (!response.ok) {
          throw new Error(result.details || result.error || rawText || "Assignment failed.");
        }

        if (!result.redirectLink) {
          throw new Error("No redirect link received from server.");
        }

        const finalGoogleFormUrl = addStudentIdToGoogleFormUrl(
          result.redirectLink,
          studentId
        );

        window.location.href = finalGoogleFormUrl;

      } catch (err) {
        msg.className = "msg error";
        msg.textContent = err.message || "Something went wrong. Please try again.";
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
