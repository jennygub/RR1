<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiment Assignment</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 620px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
    }

    h2 {
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="tel"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .info-box {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid #ddd;
      background: #fafafa;
    }

    .consent-box {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid #ddd;
    }

    .consent-box label {
      display: inline;
      font-weight: normal;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      font-size: 16px;
      cursor: pointer;
    }

    .msg {
      margin-top: 14px;
      color: #444;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>

<body>

  <h2>Start Experiment</h2>

  <div class="info-box">

    <p>
      We would like to ask your permission to use the data collected from this questionnaire for research purposes.
    </p>

    <p>
      You can find information on the purpose of the study, its procedures, conditions, risks and benefits here:
      <a
        href="https://docs.google.com/document/d/1q7BCblCBdZRKkyM1UauAzD4xp1hB_GM1/edit?usp=drive_link&ouid=108764480105967320850&rtpof=true&sd=true"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open consent document
      </a>
    </p>

  </div>

  <form id="assignmentForm">

    <label for="studentId">Student ID</label>

    <input
      type="tel"
      id="studentId"
      name="studentId"
      inputmode="numeric"
      minlength="7"
      maxlength="9"
      pattern="[0-9]{7,9}"
      placeholder="Enter 7-9 digit ID"
      required
    />

    <div class="consent-box">

      <input
        type="checkbox"
        id="consent"
        name="consent"
        required
      />

      <label for="consent">
        After reading and understanding the provided information and having had the opportunity to ask questions, do you agree to allow the data collected from this class exercise to be used for research purposes, with the assurance that your identity will remain confidential and all data will be securely stored and used only by authorized researchers?
      </label>

    </div>

    <button type="submit" id="submitBtn">
      Continue
    </button>

  </form>

  <div class="msg" id="msg"></div>

  <script>

    // =====================================================
    // GOOGLE FORM FIELD IDS
    // =====================================================

    const GOOGLE_FORM_STUDENT_ID_ENTRIES = {
      A: "entry.1895122448",
      B: "entry.1895122448",
      C: "entry.1895122448",
      D: "entry.1895122448",
      E: "entry.1895122448",
      F: "entry.1895122448"
    };

    // =====================================================
    // ADD STUDENT ID TO GOOGLE FORM URL
    // =====================================================

    function addStudentIdToGoogleFormUrl(baseUrl, studentId, group) {

      const entryCode = GOOGLE_FORM_STUDENT_ID_ENTRIES[group];

      if (!entryCode) {
        throw new Error(
          "Missing Google Form entry code for group " + group
        );
      }

      const url = new URL(baseUrl);

      url.searchParams.set(entryCode, studentId);

      return url.toString();
    }

    // =====================================================
    // FORM SUBMISSION
    // =====================================================

    document
      .getElementById("assignmentForm")
      .addEventListener("submit", async function (e) {

        e.preventDefault();

        const msg = document.getElementById("msg");
        const btn = document.getElementById("submitBtn");

        msg.className = "msg";
        msg.textContent = "";

        const studentId =
          document.getElementById("studentId").value.trim();

        const consentChecked =
          document.getElementById("consent").checked;

        // ============================================
        // VALIDATION
        // ============================================

        if (!/^[0-9]{7,9}$/.test(studentId)) {

          msg.className = "msg error";

          msg.textContent =
            "Please enter an ID with 7 to 9 digits.";

          return;
        }

        if (!consentChecked) {

          msg.className = "msg error";

          msg.textContent =
            "Please check the consent box.";

          return;
        }

        // ============================================
        // UI UPDATE
        // ============================================

        btn.disabled = true;

        msg.textContent =
          "Assigning and redirecting...";

        try {

          // ============================================
          // CALL NETLIFY FUNCTION
          // ============================================

          const response = await fetch(
            "/.netlify/functions/assign",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                studentId: studentId,
                consent: consentChecked
              })
            }
          );

          // ============================================
          // SAFE RESPONSE PARSING
          // ============================================

          const rawText = await response.text();

          let result;

          try {

            result =
              rawText ? JSON.parse(rawText) : {};

          } catch (e) {

            throw new Error(
              "Server returned non-JSON response: " +
              rawText
            );
          }

          // ============================================
          // HANDLE BACKEND ERRORS
          // ============================================

          if (!response.ok) {

            throw new Error(
              result.details ||
              result.error ||
              rawText ||
              "Assignment failed."
            );
          }

          // ============================================
          // VALIDATE RESPONSE
          // ============================================

          if (!result.redirectLink) {

            throw new Error(
              "No redirect link received from server."
            );
          }

          if (!result.group) {

            throw new Error(
              "No group received from server."
            );
          }

          // ============================================
          // BUILD FINAL GOOGLE FORM URL
          // ============================================

          const finalGoogleFormUrl =
            addStudentIdToGoogleFormUrl(
              result.redirectLink,
              studentId,
              result.group
            );

          // ============================================
          // REDIRECT
          // ============================================

          window.location.href =
            finalGoogleFormUrl;

        } catch (err) {

          msg.className = "msg error";

          msg.textContent =
            err.message ||
            "Something went wrong. Please try again.";

          btn.disabled = false;
        }

      });

  </script>

</body>
</html>
